name: Check, Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: loongarch64
            target: loongarch64-unknown-none-softfloat
          - arch: aarch64
            target: aarch64-unknown-none-softfloat
          - arch: x86_64
            target: x86_64-unknown-none
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - &setup-libudenv
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libudev-dev
          version: 1.0
      - name: Install toolchain
        run: rustup show
      - name: Check rust version
        run: rustc --version --verbose

      - name: Setup QEMU
        uses: arceos-org/setup-qemu@v1
        with:
          version: 10.1.0
          arch_list: x86_64,aarch64,riscv64,loongarch64

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          cache-targets: false

      - uses: cargo-bins/cargo-binstall@main

      - name: Install ostool
        run: cargo binstall ostool --no-confirm --force

      - name: Install cargo-binutils
        run: |
          cargo-binstall \
            --pkg-url="{ repo }/releases/download/v{ version }/{ target }.tar.gz" \
            --pkg-fmt="tgz" \
            cargo-binutils --no-confirm --force

      - name: Add Target
        run: rustc --version
      - name: Check code format
        run: cargo fmt --all -- --check

      - uses: taiki-e/install-action@cargo-hack

      - name: Clippy for workspace
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Build test
        run: ./scripts/test_${{ matrix.arch }}.sh

      - name: Test rdrive
        run: cargo test -p rdrive
