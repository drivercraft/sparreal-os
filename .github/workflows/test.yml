name: Check, Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: loongarch64
            target: loongarch64-unknown-none-softfloat
          - arch: aarch64
            target: aarch64-unknown-none-softfloat
          - arch: riscv64
            target: riscv64gc-unknown-none-elf
          - arch: x86_64
            target: x86_64-unknown-none
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rcore-os/tgoskits-container:latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          if command -v sudo >/dev/null 2>&1; then
            SUDO=sudo
          else
            SUDO=
          fi
          ${SUDO} apt-get update
          ${SUDO} apt-get install -y libudev-dev

      - name: Install toolchain
        run: rustup show
      - name: Check rust version
        run: rustc --version --verbose

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: test
          key: ${{ matrix.target }}
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: cargo-bins/cargo-binstall@v1.17.7

      - name: Install ostool
        run: cargo binstall ostool --no-confirm --force

      - name: Install cargo-binutils
        run: |
          cargo-binstall \
            --pkg-url="{ repo }/releases/download/v{ version }/{ target }.tar.gz" \
            --pkg-fmt="tgz" \
            cargo-binutils --no-confirm --force

      - name: Add Target
        run: rustc --version
      - name: Check code format
        run: cargo fmt --all -- --check

      - uses: taiki-e/install-action@cargo-hack

      - name: Clippy for workspace
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Build test
        run: ./scripts/test_${{ matrix.arch }}.sh

      - name: Test rdrive
        run: cargo test -p rdrive
